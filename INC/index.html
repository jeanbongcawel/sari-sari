<!DOCTYPE html>
<html>
<head>
    <title>Sari-Sari Store Inventory</title>
    <link rel="stylesheet" href="style.css">

   <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

/* BACKGROUND */
body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #1793c4f9 0%, #07577e 100%);
}

/* MAIN CARD */
.main-box {
    background: rgba(255, 255, 255, 0.12);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    padding: 45px;
    border-radius: 18px;
    width: 420px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
    border: 1px solid rgba(255, 255, 255, 0.2);
}

/* TITLE */
.login-title {
    font-size: 30px;
    margin-bottom: 10px;
    color: #ffffff;
    font-weight: 700;
    letter-spacing: 1px;
}

.login-subtitle {
    color: rgba(255, 255, 255, 0.8);
    margin-bottom: 25px;
    font-size: 14px;
}

/* CHOICES */
.choice-container {
    display: flex;
    justify-content: center;
    gap: 18px;
}

/* TILE CARD */
.choice-tile {
    background: rgba(255, 255, 255, 0.25);
    padding: 25px;
    width: 220px;
    border-radius: 15px;
    cursor: pointer;
    transition: all 0.3s ease;
    border: 1px solid rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(8px);
}

.choice-tile:hover {
    transform: translateY(-8px) scale(1.02);
    background: rgba(255, 255, 255, 0.35);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
}

/* TILE TEXT */
.choice-tile h2 {
    font-size: 18px;
    margin-bottom: 8px;
    color: #fff;
}

.choice-tile p {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.8);
}

/* LOGIN FORM */
#staffLoginForm {
    display: none;
    margin-top: 20px;
}

/* INPUT FIELD */
.form-group {
    position: relative;
    margin-top: 15px;
}

.form-input {
    width: 100%;
    padding: 12px 12px 12px 15px;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 14px;
    background: rgba(255, 255, 255, 0.85);
    transition: 0.3s;
}

.form-input:focus {
    background: #fff;
    box-shadow: 0 0 0 3px rgba(118, 75, 162, 0.3);
}

/* BUTTON GENERAL */
.login-btn {
    padding: 12px;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    font-weight: 600;
    transition: 0.3s;
}

/* TILE BUTTON */
.choice-tile button {
    margin-top: 12px;
    padding: 8px 18px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #11cb74, #2575fc);
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

.choice-tile button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}
</style>
</head>

<body>

<div id="choiceScreen">
    <div class="main-box">

        <h1 class="login-title">Sari-Sari Store Inventory</h1>

        <div class="choice-container">
            <div class="choice-tile">
                <h2>Staff Login</h2>
                <p>Manage orders and inventory</p>
                <button onclick="showStaffLogin()">Login</button>
            </div>
        </div>

        <!-- STAFF LOGIN FORM -->
        <div id="staffLoginForm">
            <div class="form-group">
                <input type="text" class="form-input" id="username" placeholder="Username">
            </div>

            <div class="form-group">
                <input type="password" class="form-input" id="password" placeholder="Password">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="login-btn" onclick="staffLogin()" style="flex: 1; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);">
                    Login
                </button>
                <button class="login-btn" onclick="hideStaffLogin()" style="flex: 1; background: #6c757d;">
                    Cancel
                </button>
            </div>
        </div>

    </div>
</div>

<script src="script.js"></script>

</body>
</html>
